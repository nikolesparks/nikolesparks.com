# Netlify build & deploy configuration for nikolesparks.com
# Astro outputs a fully static site to dist/. Netlify Forms picks up the
# contact form automatically because contact.astro includes a static,
# Netlify-detectable <form> with the data-netlify attribute.

[build]
  command = "npm run build"
  publish = "dist"

[build.environment]
  NODE_VERSION = "20"

# Security & caching headers
[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "SAMEORIGIN"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"

# Hashed build assets are safe to cache forever
[[headers]]
  for = "/_astro/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"
